name: L'intégration continue
permissions: {}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-ui:
    name: Construction de l'interface utilisateurice de MesQuestionsCyber
    runs-on: ubuntu-latest

    steps:
      - name: Cloner le dépôt Git
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Déterminer la version de Node.js à utiliser
        run: |
          echo "NODE_VERSION=$(./scripts/get-node-version.sh)" >> $GITHUB_ENV

      - name: Utiliser la version Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Installer les dépendances
        run: npm install -g "$(jq -r '.packageManager' package.json)" && pnpm install
        working-directory: ui

      - name: Exécute les tests
        run: pnpm run test
        working-directory: ui

      - name: Contrôler les types
        run: pnpm run check
        working-directory: ui

      - name: Contrôler le linting
        run: pnpm run lint:check
        working-directory: ui

      - name: Contrôler la mise en forme
        run: pnpm run format:check
        working-directory: ui

  build:
    name: Construction de MesQuestionsCyber
    runs-on: ubuntu-latest

    env:
      ALBERT_API_KEY: une-fausse-clef
      MODE: test

    steps:
      - name: Cloner le dépôt Git
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Installer Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: "pyproject.toml"

      - name: Installer uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Installer les dépendances
        run: uv sync

      - name: Contrôler le format du code
        run: uv run ruff check

      - name: Contrôler les types
        run: uv run mypy

      - name: Exécuter les tests
        run: uv run pytest
