name: L'intégration continue
permissions: {}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-ui:
    name: Construction de l'interface utilisateurice de MesQuestionsCyber
    runs-on: ubuntu-latest

    steps:
      - name: Cloner le dépôt Git
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Déterminer la version de Node.js à utiliser
        run: |
          echo "NODE_VERSION=$(./scripts/get-node-version.sh)" >> $GITHUB_ENV

      - name: Utiliser la version Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Installer les dépendances
        run: npm install -g "$(jq -r '.packageManager' package.json)" && pnpm install
        working-directory: ui

      - name: Exécute les tests
        run: pnpm run test
        working-directory: ui

      - name: Contrôler les types
        run: pnpm run check
        working-directory: ui

      - name: Contrôler le linting
        run: pnpm run lint:check
        working-directory: ui

      - name: Contrôler la mise en forme
        run: pnpm run format:check
        working-directory: ui

  build:
    name: Construction de MesQuestionsCyber
    runs-on: ubuntu-latest

    env:
      ALBERT_API_KEY: une-fausse-clef
      MODE: test

    steps:
      - name: Cloner le dépôt Git
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Installer Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: "pyproject.toml"

      - name: Installer uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Installer les dépendances
        run: uv sync

      - name: Contrôler le format du code
        run: uv run ruff check

      - name: Contrôler les types
        run: uv run mypy

      - name: Exécuter les tests
        run: uv run pytest
